name: 每日自动更新

on:
  schedule:
    # UTC 16:00 = 北京时间 0:00
    - cron: '0 16 * * *'
  workflow_dispatch: {} # 允许在 Actions 页手动触发

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: 检出仓库
        uses: actions/checkout@v4

      - name: 安装 Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: 生成 README
        run: node scripts/update.mjs

      - name: 提交更新
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --staged --quiet; then
            echo "无变化,跳过提交"
          else
            git commit -m "每日自动更新 $(date -u +%Y-%m-%d)"
            git push
          fi
